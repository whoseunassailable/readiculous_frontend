<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Readiculous Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f7efe4 0%, #efe3cf 100%);
        color: #2f2418;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        padding: 32px;
        border: 3px solid #b8743a;
        border-radius: 24px;
        background: rgba(255, 249, 240, 0.96);
        box-shadow: 8px 8px 0 rgba(47, 36, 24, 0.14);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.8rem);
      }

      p {
        margin: 0 0 16px;
        line-height: 1.5;
      }

      a {
        color: #4d3277;
        font-weight: 700;
      }

      video {
        width: 100%;
        border-radius: 18px;
        border: 2px solid #2f2418;
        background: #000;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Readiculous Demo</h1>
      <p>
        Direct video link:
        <a href="./demo/readiculous-demo.mp4">readiculous-demo.mp4</a>
      </p>
      <video controls preload="metadata">
        <source src="./demo/readiculous-demo.mp4" type="video/mp4" />
        Your browser does not support embedded video playback.
      </video>
    </main>
  </body>
</html>
